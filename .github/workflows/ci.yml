name: ML Opsidian CI Pipeline

on:
  push:
    branches: [ main, 'feature/**' ] # Runs on pushes to main or any feature branch
  pull_request:
    branches: [ main ] # Runs on every PR to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Uses a fresh Linux environment for every run

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with Flake8 (Code Quality Check)
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. 
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test Imports (Sanity Check)
      run: |
        python -c "import pandas; import numpy; import sklearn; print('✅ All core libraries imported successfully')"